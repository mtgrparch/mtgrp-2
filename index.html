<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTGRP</title>
  <link rel="icon" href="photos/FAVICON/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;600;700;800&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top left: MTGRP wordmark -->
  <div id="wordmark">MTGRP</div>

  <!-- Top right: + opens about modal -->
  <div id="about-btn">+</div>

  <!-- Bottom centre: offices -->
  <div id="footer-cities">
    <span id="weather-beirut">Beirut</span>
    &nbsp;&mdash;&nbsp;
    <span id="weather-madrid">Madrid</span>
    &nbsp;&mdash;&nbsp;
    <span id="weather-milan">Milan</span>
  </div>

  <!-- Parallax columns injected by JS -->
  <div class="parallax-wrapper" id="parallax-grid"></div>

  <!-- Universal modal -->
  <div id="modal-container" class="hidden">
    <div class="modal-box">
      <button id="close-modal">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
